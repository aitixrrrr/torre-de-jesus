<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página no encontrada - 404</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .error-container {
            text-align: center;
            padding: 60px 20px;
            max-width: 600px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .error-code {
            font-size: 100px;
            color: #dc0526;
            margin: 0;
            text-shadow: 3px 3px 0px #77b5ce;
        }
    </style>
</head>
<body>
    <div style="padding-top: 40px;">
        <div class="error-container">
            <h1 class="error-code">404</h1>
            <h2>Construcción no encontrada</h2>
            <p>Lo sentimos, la página que buscas no existe o ha sido movida como parte de las reformas del templo.</p>
            <a href="index.html" class="btn" style="text-decoration: none;">Volver al Inicio</a>
        </div>
    </div>
</body>
</html>
